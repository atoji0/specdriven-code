    <title>Spec2App Demo</title>
    <script>
      // GitHub Pages SPA リダイレクト復元
      // 404.html から ?p=<path> で飛んできた場合、history に正しいパスを戻す
      (function () {
        var p = new URLSearchParams(window.location.search).get("p");
        if (p) {
          window.history.replaceState(null, "", decodeURIComponent(p));
        }
      })();
    </script>
