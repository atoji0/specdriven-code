<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      // GitHub Pages SPA リダイレクトトリック
      // 存在しないパスへの直接アクセスは 404.html が返る。
      // パスをクエリ文字列にエンコードして index.html にリダイレクトする。
      var l = window.location;
      l.replace(
        l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
        l.pathname.split("/").slice(0, 1).join("/") +
        "/?p=" + encodeURIComponent(l.pathname + l.search) +
        (l.hash || "")
      );
    </script>
  </head>
  <body></body>
</html>
